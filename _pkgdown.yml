url: https://amaltawfik.github.io/lssdoc/

home:
  title: "lssdoc: Word and PDF questionnaire documents from LimeSurvey '.lss' files"
  description: >
    Build publication-quality Word ('.docx') or PDF questionnaire
    documents from a LimeSurvey '.lss' export, aimed at ethics
    committees, methodologists and translators reviewing
    multilingual questionnaires. Two layouts ("cards" -- one block
    per item, or "table" -- a dense single questionnaire table).
    Side-by-side rendering of up to four content languages. Chrome
    (column headers, row labels, type labels, audit section)
    localized in English, French, German, Spanish and Italian.
    Automated audit flags integrity anomalies (missing
    translations, dangling references, structural issues) without
    any AI. Processing is fully local -- nothing is ever uploaded
    to a third-party service.

template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax
  bslib:
    # LimeSurvey brand lime green for the website -- a nod to the
    # source data format. The rendered .docx output keeps its
    # editorial petrol-blue palette, which is a deliberate
    # separation: the website is the source-aware portal, the
    # document is the publication-grade output.
    primary: "#5C9F1A"
    info: "#7FA82E"
    base_font:
      google: {family: "IBM Plex Sans", wght: [300, 400, 500, 600, 700], ital: [0, 1]}
    code_font:
      google: {family: "IBM Plex Mono", wght: [400, 500, 700], ital: [0, 1]}
    headings-color: "#2e2e2e"
    link-color: "#5C9F1A"
    link-decoration: underline dotted

navbar:
  structure:
    left: [intro, get-started, reference, news]
    right: [search, lightswitch, github]
  components:
    intro:
      text: Home
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: News
      href: news/index.html
    get-started:
      text: Get started
      href: articles/lssdoc.html
    github:
      icon: fa-github
      aria-label: GitHub repository
      href: https://github.com/amaltawfik/lssdoc

reference:
  - title: Render
    desc: >
      Render a LimeSurvey survey to a Word or PDF document. The
      output format is inferred from the extension of `output`
      (`.docx` or `.pdf`). Each function accepts either a path to
      a `.lss` file or a pre-parsed `lss` object returned by
      `read_lss()`.
    contents:
      - render_questionnaire
      - render_audit
  - title: Read and audit
    desc: >
      Parse a `.lss` file into a structured object, and audit a
      survey for reviewable anomalies (missing translations,
      dangling references, structural issues). Useful for
      inspecting a survey before rendering, or for rendering
      several variants from a single parse.
    contents:
      - read_lss
      - audit_lss
  - title: Package overview
    contents:
      - lssdoc-package
